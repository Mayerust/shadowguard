# ══════════════════════════════════════════════════════════
#  docker-compose.yml  — Full ShadowGuard Stack
#
#  Services:
#    nginx      — Reverse proxy / SSL termination (port 80)
#    shadowguard — ML-WAF engine (port 5000, internal)
#    targetapp   — Vulnerable demo app (port 8080, internal)
#
#  Usage:
#    docker-compose up --build
#    Open http://<LAN-IP>/dashboard
# ══════════════════════════════════════════════════════════

version: "3.9"

services:

  # ── Nginx (public-facing reverse proxy) ──────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - shadowguard
    networks:
      - waf_net
    restart: unless-stopped

  # ── ShadowGuard ML-WAF ────────────────────────────────────
  shadowguard:
    build: .
    expose:
      - "5000"
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs
    environment:
      - TARGET_APP_URL=http://targetapp:8080
      - PYTHONUNBUFFERED=1
    depends_on:
      - targetapp
    networks:
      - waf_net
    restart: unless-stopped
    # Security hardening
    read_only: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ── Target App (vulnerable, internal only) ────────────────
  targetapp:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: python target_app.py
    expose:
      - "8080"
    networks:
      - waf_net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  waf_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16