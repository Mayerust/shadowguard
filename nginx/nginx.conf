worker_processes  auto;
events { worker_connections 1024; }

http {
    #Logging 
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    #Performance
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    #Security Headers
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin"        always;
    add_header Content-Security-Policy   "default-src 'self' https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'" always;

    #Hide Nginx version
    server_tokens off;

    #Rate limiting
    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=30r/s;
    limit_req_status 429;

    #Upstream: ShadowGuard WAF
    upstream waf {
        server shadowguard:5000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;   # Catch-all for LAN testing

        #Rate limiting per IP
        limit_req zone=per_ip burst=60 nodelay;

        #Block common scanner paths
        location ~* \.(php|asp|aspx|jsp|cgi)$ {
            return 444;
        }
        location ~ /\. {
            return 404;
        }
        location ~* (\.env|wp-login|xmlrpc\.php|\.git) {
            return 404;
        }

        #Dashboard (no auth for demo)
        location /dashboard {
            proxy_pass         http://waf/dashboard;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        #WAF API
        location /api/ {
            proxy_pass         http://waf/api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        #Default: route all traffic through WAF
        location / {
            proxy_pass         http://waf;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";

            #Buffer settings for WAF inspection
            proxy_buffer_size          16k;
            proxy_buffers              8 16k;
            proxy_busy_buffers_size    32k;
            proxy_read_timeout         60s;
            proxy_connect_timeout      10s;
        }
    }
}